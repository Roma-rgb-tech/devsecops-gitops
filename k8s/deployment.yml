apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
  namespace: devsecops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-app
  template:
    metadata:
      labels:
        app: devsecops-app
    spec:
      containers:
        - name: app
          image: ghcr.io/roma-rgb-tech/devsecops-pipeline-demo:ca7a21eac0403714e07f765ae936c82b545982d0
          ports:
            - containerPort: 8000